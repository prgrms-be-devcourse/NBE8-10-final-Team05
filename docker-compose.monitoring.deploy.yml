x-common-service: &common-service
  restart: unless-stopped
  environment:
    TZ: Asia/Seoul
  networks:
    - maum-on-prod
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: maum-on-prometheus-prod
    <<: *common-service
    env_file:
      - .env
    environment:
      BACKEND_SCRAPE_TARGET: ${BACKEND_SCRAPE_TARGET:-maum-on-1-1:8080}
      PROMETHEUS_EXTERNAL_URL: ${PROMETHEUS_EXTERNAL_URL:-http://127.0.0.1:9090/}
    entrypoint:
      - /bin/sh
      - /etc/prometheus/render-and-run.sh
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.tmpl:ro
      - ./infra/prometheus/render-and-run.sh:/etc/prometheus/render-and-run.sh:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:12.3.1
    container_name: maum-on-grafana-prod
    <<: *common-service
    env_file:
      - .env
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: "X-WEBAUTH-USER"
      GF_AUTH_PROXY_HEADER_PROPERTY: "username"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://127.0.0.1:3000/}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data:

networks:
  maum-on-prod:
    name: maum-on-prod
