name: deploy-monitoring

on:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/deploy-monitoring.yml"
      - "docker-compose.monitoring.deploy.yml"
      - "infra/grafana/dashboards/**"
      - "infra/grafana/provisioning/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-monitoring
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: monitoring
    env:
      DEPLOY_PATH: ${{ vars.MONITORING_DEPLOY_PATH || '/opt/maum-on/monitoring' }}
      EC2_INSTANCE_TAG_NAME: ${{ vars.EC2_INSTANCE_TAG_NAME || 'devcos-team05-ec2-1' }}
      NPM_BASE_URL: ${{ secrets.NPM_BASE_URL || 'https://127.0.0.1:81' }}
      PROXY_HOST_DOMAIN: ${{ secrets.API_PROXY_DOMAIN || '' }}
      NPM_ADMIN_PASSWORD: ${{ secrets.NPM_ADMIN_PASSWORD || '' }}
      DOT_ENV: ${{ secrets.DOT_ENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render monitoring env
        run: |
          set -euo pipefail
          install -d "$RUNNER_TEMP/monitoring-deploy"
          printf '%s' "$DOT_ENV" > "$RUNNER_TEMP/monitoring-deploy/.env"

      - name: Validate monitoring compose
        run: |
          set -euo pipefail
          cp docker-compose.monitoring.deploy.yml "$RUNNER_TEMP/monitoring-deploy/docker-compose.monitoring.deploy.yml"
          mkdir -p "$RUNNER_TEMP/monitoring-deploy/infra"
          cp -R infra/prometheus "$RUNNER_TEMP/monitoring-deploy/infra/prometheus"
          cp -R infra/grafana "$RUNNER_TEMP/monitoring-deploy/infra/grafana"
          docker compose \
            --env-file "$RUNNER_TEMP/monitoring-deploy/.env" \
            -f "$RUNNER_TEMP/monitoring-deploy/docker-compose.monitoring.deploy.yml" \
            config >/dev/null

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Resolve EC2 instance by tag
        id: resolve_instance
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${EC2_INSTANCE_TAG_NAME}" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          [[ -n "${INSTANCE_ID}" && "${INSTANCE_ID}" != "None" ]] || { echo "No running instance found"; exit 1; }
          echo "INSTANCE_ID=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

      - name: Deploy monitoring stack via SSM
        run: |
          set -euo pipefail

          DOT_ENV_B64="$(base64 -w0 "$RUNNER_TEMP/monitoring-deploy/.env")"
          GITHUB_TOKEN_B64="$(printf '%s' "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)"
          NPM_ADMIN_PASSWORD_B64="$(printf '%s' "$NPM_ADMIN_PASSWORD" | base64 -w0)"

          DEPLOY_SCRIPT=$(cat <<'EOF'
          set -euo pipefail

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD=(docker-compose)
          else
            COMPOSE_CMD=(
              docker run --rm
              -v /var/run/docker.sock:/var/run/docker.sock
              -v "$PWD:$PWD"
              -w "$PWD"
              --entrypoint /docker-compose
              docker/compose-bin:v2.40.3
            )
          fi

          GITHUB_TOKEN="$(printf '%s' "$GITHUB_TOKEN_B64" | base64 -d)"
          NPM_ADMIN_PASSWORD="$(printf '%s' "$NPM_ADMIN_PASSWORD_B64" | base64 -d)"
          WORKDIR="/tmp/maum-on-deploy-${COMMIT_SHA}"
          ROLLBACK_TS="$(date +%Y%m%d_%H%M%S)"
          ROLLBACK_DIR="${DEPLOY_PATH}/.rollback-${ROLLBACK_TS}"

          rollback() {
            echo "monitoring deploy failed, starting rollback..."
            [[ -d "${ROLLBACK_DIR}" ]] || { echo "rollback skipped: no backup"; return 0; }

            if [[ -f "${ROLLBACK_DIR}/docker-compose.monitoring.deploy.yml" ]]; then
              cp "${ROLLBACK_DIR}/docker-compose.monitoring.deploy.yml" "${DEPLOY_PATH}/docker-compose.monitoring.deploy.yml"
            fi
            if [[ -f "${ROLLBACK_DIR}/.env" ]]; then
              cp "${ROLLBACK_DIR}/.env" "${DEPLOY_PATH}/.env"
            fi
            if [[ -d "${ROLLBACK_DIR}/prometheus" ]]; then
              rm -rf "${DEPLOY_PATH}/infra/prometheus"
              cp -R "${ROLLBACK_DIR}/prometheus" "${DEPLOY_PATH}/infra/prometheus"
            fi
            if [[ -d "${ROLLBACK_DIR}/grafana" ]]; then
              rm -rf "${DEPLOY_PATH}/infra/grafana"
              cp -R "${ROLLBACK_DIR}/grafana" "${DEPLOY_PATH}/infra/grafana"
            fi

            cd "${DEPLOY_PATH}"
            "${COMPOSE_CMD[@]}" -f docker-compose.monitoring.deploy.yml up -d --remove-orphans || true
          }

          trap rollback ERR

          mkdir -p "$DEPLOY_PATH/infra"
          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"

          mkdir -p "${ROLLBACK_DIR}"
          if [[ -f "${DEPLOY_PATH}/docker-compose.monitoring.deploy.yml" ]]; then
            cp "${DEPLOY_PATH}/docker-compose.monitoring.deploy.yml" "${ROLLBACK_DIR}/docker-compose.monitoring.deploy.yml"
          fi
          if [[ -f "${DEPLOY_PATH}/.env" ]]; then
            cp "${DEPLOY_PATH}/.env" "${ROLLBACK_DIR}/.env"
          fi
          if [[ -d "${DEPLOY_PATH}/infra/prometheus" ]]; then
            cp -R "${DEPLOY_PATH}/infra/prometheus" "${ROLLBACK_DIR}/prometheus"
          fi
          if [[ -d "${DEPLOY_PATH}/infra/grafana" ]]; then
            cp -R "${DEPLOY_PATH}/infra/grafana" "${ROLLBACK_DIR}/grafana"
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/tarball/${COMMIT_SHA}" \
            | tar -xz --strip-components=1 -C "$WORKDIR"

          cp "$WORKDIR/docker-compose.monitoring.deploy.yml" "$DEPLOY_PATH/docker-compose.monitoring.deploy.yml"
          rm -rf "$DEPLOY_PATH/infra/prometheus" "$DEPLOY_PATH/infra/grafana"
          cp -R "$WORKDIR/infra/prometheus" "$DEPLOY_PATH/infra/prometheus"
          cp -R "$WORKDIR/infra/grafana" "$DEPLOY_PATH/infra/grafana"
          printf '%s' "$DOT_ENV_B64" | base64 -d > "$DEPLOY_PATH/.env"

          cd "$DEPLOY_PATH"
          TARGET_DOMAIN="${PROXY_HOST_DOMAIN:-${APP_1_DOMAIN:-}}"
          if [[ -n "${TARGET_DOMAIN}" && -n "${NPM_ADMIN_PASSWORD}" ]]; then
            COOKIE_JAR="/tmp/npm_cookies_monitoring.txt"
            LOGIN_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -c "${COOKIE_JAR}" \
              -X POST "${NPM_BASE_URL}/api/tokens" \
              -H "Content-Type: application/json" \
              -d "$(jq -nc --arg id "admin@npm.com" --arg pw "${NPM_ADMIN_PASSWORD}" '{identity:$id, secret:$pw}')")
            if [[ "${LOGIN_CODE}" == "200" ]]; then
              PROXY_ID=$(curl -sk -b "${COOKIE_JAR}" -X GET "${NPM_BASE_URL}/api/nginx/proxy-hosts" \
                | jq -r --arg domain "${TARGET_DOMAIN}" '.[] | select((.domain_names // []) | index($domain)) | .id' \
                | head -n 1)
              if [[ -n "${PROXY_ID}" && "${PROXY_ID}" != "null" ]]; then
                ACTIVE_HOST=$(curl -sk -b "${COOKIE_JAR}" -X GET "${NPM_BASE_URL}/api/nginx/proxy-hosts/${PROXY_ID}" | jq -r '.forward_host // empty')
                ACTIVE_PORT=$(curl -sk -b "${COOKIE_JAR}" -X GET "${NPM_BASE_URL}/api/nginx/proxy-hosts/${PROXY_ID}" | jq -r '.forward_port // 8080')
                if [[ -n "${ACTIVE_HOST}" ]]; then
                  if grep -q '^BACKEND_SCRAPE_TARGET=' .env; then
                    sed -i -E "s#^BACKEND_SCRAPE_TARGET=.*#BACKEND_SCRAPE_TARGET=${ACTIVE_HOST}:${ACTIVE_PORT}#" .env
                  else
                    printf '\nBACKEND_SCRAPE_TARGET=%s:%s\n' "${ACTIVE_HOST}" "${ACTIVE_PORT}" >> .env
                  fi
                fi
              fi
            fi
          fi

          "${COMPOSE_CMD[@]}" -f docker-compose.monitoring.deploy.yml up -d --remove-orphans

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9090/-/ready >/dev/null && \
               curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              trap - ERR
              ls -1dt "${DEPLOY_PATH}"/.rollback-* 2>/dev/null | tail -n +6 | xargs -r rm -rf
              exit 0
            fi
            sleep 5
          done

          echo "monitoring health check timed out" >&2
          exit 1
          EOF
          )

          EXPORTS_CMD="export DEPLOY_PATH='${DEPLOY_PATH}' REPO='${{ github.repository }}' COMMIT_SHA='${{ github.sha }}' DOT_ENV_B64='${DOT_ENV_B64}' GITHUB_TOKEN_B64='${GITHUB_TOKEN_B64}' NPM_ADMIN_PASSWORD_B64='${NPM_ADMIN_PASSWORD_B64}' NPM_BASE_URL='${NPM_BASE_URL}' PROXY_HOST_DOMAIN='${PROXY_HOST_DOMAIN}'"
          PARAMS=$(jq -nc --arg c1 "$EXPORTS_CMD" --arg c2 "$DEPLOY_SCRIPT" '{"commands":[$c1,$c2]}')

          COMMAND_ID=$(aws ssm send-command \
            --region "${{ secrets.AWS_REGION }}" \
            --instance-ids "${{ steps.resolve_instance.outputs.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          WAIT_MAX=900
          WAIT_INTERVAL=10
          WAIT_ELAPSED=0
          while (( WAIT_ELAPSED < WAIT_MAX )); do
            CMD_STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ steps.resolve_instance.outputs.INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Unknown")
            [[ "${CMD_STATUS}" == "InProgress" || "${CMD_STATUS}" == "Pending" ]] || break
            sleep "${WAIT_INTERVAL}"
            WAIT_ELAPSED=$(( WAIT_ELAPSED + WAIT_INTERVAL ))
          done

          INVOCATION=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.resolve_instance.outputs.INSTANCE_ID }}")
          STATUS=$(echo "$INVOCATION" | jq -r '.Status')
          echo "$INVOCATION" | jq -r '.StandardOutputContent'
          echo "$INVOCATION" | jq -r '.StandardErrorContent' >&2
          [[ "$STATUS" == "Success" ]] || exit 1
