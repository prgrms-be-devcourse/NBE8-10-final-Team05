name: deploy-backend

on:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"
      - "back/.env"
      - "back/src/**"
      - "back/build.gradle.kts"
      - "back/settings.gradle.kts"
      - "back/Dockerfile"
      - "Dockerfile.cd"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: prod
    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/maum_on-backend
      DEPLOY_PATH: ${{ vars.BACKEND_DEPLOY_PATH || '/opt/maum-on/backend' }}
      APP_PORT: ${{ vars.APP_PORT || 8080 }}
      CONTAINER_PORT: ${{ vars.BACKEND_CONTAINER_PORT || 8080 }}
      BACKEND_SLOT_A: ${{ vars.BACKEND_SLOT_A || 'maum-on-backend-slot-a' }}
      BACKEND_SLOT_B: ${{ vars.BACKEND_SLOT_B || 'maum-on-backend-slot-b' }}
      EC2_INSTANCE_TAG_NAME: ${{ vars.EC2_INSTANCE_TAG_NAME || 'devcos-team05-ec2-1' }}
      NPM_BASE_URL: ${{ secrets.NPM_BASE_URL || 'https://127.0.0.1:81' }}
      PROXY_HOST_DOMAIN: ${{ secrets.API_PROXY_DOMAIN || '' }}
      NPM_ADMIN_PASSWORD: ${{ secrets.NPM_ADMIN_PASSWORD || '' }}
      DOT_ENV: ${{ secrets.DOT_ENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew
        working-directory: back

      - name: Build backend boot jar
        run: ./gradlew --no-daemon bootJar -x test
        working-directory: back

      - name: Copy boot jar to deterministic path
        run: |
          set -euo pipefail
          jar_file="$(find back/build/libs -maxdepth 1 -name '*.jar' ! -name '*-plain.jar' | head -n 1)"
          if [ -z "$jar_file" ]; then
            echo "boot jar not found" >&2
            exit 1
          fi
          cp "$jar_file" back/build/libs/app.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR for push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cd
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render backend env
        run: |
          set -euo pipefail
          install -d "$RUNNER_TEMP/backend-deploy"
          printf '%s' "$DOT_ENV" > "$RUNNER_TEMP/backend-deploy/.env"
          {
            printf '\nGHCR_IMAGE=%s\n' "$GHCR_IMAGE"
            printf 'IMAGE_TAG=%s\n' "${GITHUB_SHA}"
            printf 'APP_PORT=%s\n' "$APP_PORT"
          } >> "$RUNNER_TEMP/backend-deploy/.env"

      - name: Validate backend compose
        run: |
          set -euo pipefail
          cp docker-compose.deploy.yml "$RUNNER_TEMP/backend-deploy/docker-compose.deploy.yml"
          docker compose \
            --env-file "$RUNNER_TEMP/backend-deploy/.env" \
            -f "$RUNNER_TEMP/backend-deploy/docker-compose.deploy.yml" \
            config >/dev/null

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Resolve EC2 instance by tag
        id: resolve_instance
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${EC2_INSTANCE_TAG_NAME}" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          [[ -n "${INSTANCE_ID}" && "${INSTANCE_ID}" != "None" ]] || { echo "No running instance found"; exit 1; }
          echo "INSTANCE_ID=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

      - name: Deploy backend stack via SSM
        run: |
          set -euo pipefail

          DOT_ENV_B64="$(base64 -w0 "$RUNNER_TEMP/backend-deploy/.env")"
          GITHUB_TOKEN_B64="$(printf '%s' "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)"
          NPM_ADMIN_PASSWORD_B64="$(printf '%s' "$NPM_ADMIN_PASSWORD" | base64 -w0)"

          DEPLOY_SCRIPT=$(cat <<'EOF'
          set -euo pipefail

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD=(docker-compose)
          else
            COMPOSE_CMD=(
              docker run --rm
              -v /var/run/docker.sock:/var/run/docker.sock
              -v "$PWD:$PWD"
              -w "$PWD"
              --entrypoint /docker-compose
              docker/compose-bin:v2.40.3
            )
          fi

          GITHUB_TOKEN="$(printf '%s' "$GITHUB_TOKEN_B64" | base64 -d)"
          NPM_ADMIN_PASSWORD="$(printf '%s' "$NPM_ADMIN_PASSWORD_B64" | base64 -d)"
          WORKDIR="/tmp/maum-on-deploy-${COMMIT_SHA}"
          IMAGE="${GHCR_IMAGE}:${COMMIT_SHA}"
          SLOT_A="${BACKEND_SLOT_A}"
          SLOT_B="${BACKEND_SLOT_B}"
          CONTAINER_PORT="${CONTAINER_PORT}"

          # Legacy compatibility: read APP_1_DOMAIN/PASSWORD_1 from host env if present.
          if [[ -f /etc/environment ]]; then
            set -a
            while IFS='=' read -r key value; do
              [[ -z "$key" || "$key" =~ ^# ]] && continue
              printf -v "$key" '%s' "$value"
            done < /etc/environment
            set +a
          fi

          mkdir -p "$DEPLOY_PATH"
          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/tarball/${COMMIT_SHA}" \
            | tar -xz --strip-components=1 -C "$WORKDIR"

          cp "$WORKDIR/docker-compose.deploy.yml" "$DEPLOY_PATH/docker-compose.deploy.yml"
          printf '%s' "$DOT_ENV_B64" | base64 -d > "$DEPLOY_PATH/.env"

          cd "$DEPLOY_PATH"
          docker network inspect common >/dev/null 2>&1 || docker network create common
          printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          "${COMPOSE_CMD[@]}" --env-file .env -f docker-compose.deploy.yml up -d postgres redis
          docker pull "${IMAGE}"
          docker volume create backend-uploads >/dev/null

          TARGET_DOMAIN="${PROXY_HOST_DOMAIN:-${APP_1_DOMAIN:-}}"
          NPM_PASSWORD_EFFECTIVE="${NPM_ADMIN_PASSWORD:-${PASSWORD_1:-}}"
          if [[ -z "${TARGET_DOMAIN}" ]]; then
            echo "TARGET_DOMAIN is required (set API_PROXY_DOMAIN or APP_1_DOMAIN)." >&2
            exit 1
          fi

          [[ -n "${NPM_PASSWORD_EFFECTIVE:-}" ]] || {
            echo "NPM password is required (set NPM_ADMIN_PASSWORD or PASSWORD_1)." >&2
            exit 1
          }

          COOKIE_JAR="/tmp/npm_cookies.txt"
          LOGIN_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -c "${COOKIE_JAR}" \
            -X POST "${NPM_BASE_URL}/api/tokens" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg id "admin@npm.com" --arg pw "${NPM_PASSWORD_EFFECTIVE}" '{identity:$id, secret:$pw}')")
          [[ "${LOGIN_CODE}" == "200" ]] || {
            echo "NPM login failed (HTTP ${LOGIN_CODE})" >&2
            exit 1
          }

          PROXY_ID=$(curl -sk -b "${COOKIE_JAR}" -X GET "${NPM_BASE_URL}/api/nginx/proxy-hosts" \
            | jq -r --arg domain "${TARGET_DOMAIN}" '.[] | select((.domain_names // []) | index($domain)) | .id' \
            | head -n 1)
          [[ -n "${PROXY_ID}" && "${PROXY_ID}" != "null" ]] || {
            echo "NPM proxy host not found for ${TARGET_DOMAIN}" >&2
            exit 1
          }

          CURRENT_CFG=$(curl -sk -b "${COOKIE_JAR}" -X GET "${NPM_BASE_URL}/api/nginx/proxy-hosts/${PROXY_ID}")
          CURRENT_HOST=$(echo "${CURRENT_CFG}" | jq -r '.forward_host // ""')

          if [[ "${CURRENT_HOST}" == "${SLOT_A}" ]]; then
            BLUE="${SLOT_A}"
            GREEN="${SLOT_B}"
          elif [[ "${CURRENT_HOST}" == "${SLOT_B}" ]]; then
            BLUE="${SLOT_B}"
            GREEN="${SLOT_A}"
          elif [[ "${CURRENT_HOST}" == "maum-on-backend-prod" || "${CURRENT_HOST}" == "maum_on_1_1" || "${CURRENT_HOST}" == "maum_on_1_2" ]]; then
            BLUE="${CURRENT_HOST}"
            GREEN="${SLOT_A}"
          else
            BLUE="none"
            GREEN="${SLOT_A}"
          fi

          docker rm -f "${GREEN}" >/dev/null 2>&1 || true
          docker run -d --name "${GREEN}" \
            --restart unless-stopped \
            --network maum-on-prod \
            -e TZ=Asia/Seoul \
            --env-file "${DEPLOY_PATH}/.env" \
            -v backend-uploads:/app/uploads \
            "${IMAGE}" >/dev/null

          docker network connect common "${GREEN}" >/dev/null 2>&1 || true

          TIMEOUT=180
          INTERVAL=3
          ELAPSED=0
          CODE=000
          CONTAINER_IP=$(docker inspect --format '{{range $name, $network := .NetworkSettings.Networks}}{{if eq $name "maum-on-prod"}}{{$network.IPAddress}}{{end}}{{end}}' "${GREEN}")
          [[ -n "${CONTAINER_IP}" ]] || {
            echo "Failed to resolve container IP for ${GREEN}" >&2
            docker rm -f "${GREEN}" >/dev/null 2>&1 || true
            exit 1
          }
          while (( ELAPSED < TIMEOUT )); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${CONTAINER_IP}:${CONTAINER_PORT}/actuator/health" || echo 000)
            [[ "${CODE}" == "200" ]] && break
            sleep "${INTERVAL}"
            ELAPSED=$(( ELAPSED + INTERVAL ))
          done
          [[ "${CODE}" == "200" ]] || {
            echo "Health check failed for ${GREEN}" >&2
            docker logs --tail=200 "${GREEN}" >&2 || true
            docker rm -f "${GREEN}" >/dev/null 2>&1 || true
            exit 1
          }

          UPDATED_CFG=$(echo "${CURRENT_CFG}" | jq \
            --arg host "${GREEN}" \
            --argjson port "${CONTAINER_PORT}" \
            '.forward_scheme = "http"
            | .forward_host = $host
            | .forward_port = $port
            | .allow_websocket_upgrade = true
            | .locations = ((.locations // []) | map(
                if ((.path // "") == "/sse/")
                then .forward_scheme = "http"
                  | .forward_host = $host
                  | .forward_port = $port
                  | .allow_websocket_upgrade = true
                else .
                end
              ))')
          SWITCH_CODE=$(curl -sk -o /tmp/npm_switch_resp.json -w "%{http_code}" \
            -b "${COOKIE_JAR}" \
            -X PUT "${NPM_BASE_URL}/api/nginx/proxy-hosts/${PROXY_ID}" \
            -H "Content-Type: application/json" \
            --data-raw "${UPDATED_CFG}")
          [[ "${SWITCH_CODE}" == "200" ]] || {
            echo "NPM switch failed (HTTP ${SWITCH_CODE})" >&2
            cat /tmp/npm_switch_resp.json >&2 || true
            docker rm -f "${GREEN}" >/dev/null 2>&1 || true
            exit 1
          }

          MONITORING_ENV="/opt/maum-on/monitoring/.env"
          if [[ -f "${MONITORING_ENV}" ]]; then
            if grep -q '^BACKEND_SCRAPE_TARGET=' "${MONITORING_ENV}"; then
              sed -i -E "s#^BACKEND_SCRAPE_TARGET=.*#BACKEND_SCRAPE_TARGET=${GREEN}:${CONTAINER_PORT}#" "${MONITORING_ENV}"
            else
              printf '\nBACKEND_SCRAPE_TARGET=%s:%s\n' "${GREEN}" "${CONTAINER_PORT}" >> "${MONITORING_ENV}"
            fi
          fi

          if [[ "${BLUE}" != "none" && "${BLUE}" != "${GREEN}" ]]; then
            docker rm -f "${BLUE}" >/dev/null 2>&1 || true
          fi

          {
            docker images --format '{{.Repository}}:{{.Tag}}' \
              | grep -F "${GHCR_IMAGE}:" \
              | grep -v -F ":${COMMIT_SHA}" \
              | grep -v -F ":latest" \
              | grep -v -F ":<none>" \
              | xargs -r docker rmi
          } || true
          EOF
          )

          EXPORTS_CMD="export DEPLOY_PATH='${DEPLOY_PATH}' APP_PORT='${APP_PORT}' REPO='${{ github.repository }}' COMMIT_SHA='${{ github.sha }}' GITHUB_ACTOR='${{ github.actor }}' GHCR_IMAGE='${GHCR_IMAGE}' DOT_ENV_B64='${DOT_ENV_B64}' GITHUB_TOKEN_B64='${GITHUB_TOKEN_B64}' NPM_ADMIN_PASSWORD_B64='${NPM_ADMIN_PASSWORD_B64}' NPM_BASE_URL='${NPM_BASE_URL}' PROXY_HOST_DOMAIN='${PROXY_HOST_DOMAIN}' BACKEND_SLOT_A='${BACKEND_SLOT_A}' BACKEND_SLOT_B='${BACKEND_SLOT_B}' CONTAINER_PORT='${CONTAINER_PORT}'"
          PARAMS=$(jq -nc --arg c1 "$EXPORTS_CMD" --arg c2 "$DEPLOY_SCRIPT" '{"commands":[$c1,$c2]}')

          COMMAND_ID=$(aws ssm send-command \
            --region "${{ secrets.AWS_REGION }}" \
            --instance-ids "${{ steps.resolve_instance.outputs.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          WAIT_MAX=900
          WAIT_INTERVAL=10
          WAIT_ELAPSED=0
          while (( WAIT_ELAPSED < WAIT_MAX )); do
            CMD_STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ steps.resolve_instance.outputs.INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Unknown")
            [[ "${CMD_STATUS}" == "InProgress" || "${CMD_STATUS}" == "Pending" ]] || break
            sleep "${WAIT_INTERVAL}"
            WAIT_ELAPSED=$(( WAIT_ELAPSED + WAIT_INTERVAL ))
          done

          INVOCATION=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ steps.resolve_instance.outputs.INSTANCE_ID }}")
          STATUS=$(echo "$INVOCATION" | jq -r '.Status')
          echo "$INVOCATION" | jq -r '.StandardOutputContent'
          echo "$INVOCATION" | jq -r '.StandardErrorContent' >&2
          [[ "$STATUS" == "Success" ]] || exit 1
