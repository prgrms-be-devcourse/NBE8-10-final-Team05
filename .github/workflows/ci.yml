name: ci

on:
  pull_request:
    branches:
      - develope
  push:
    branches:
      - develope
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      GOOGLE_API_KEY: test_key_dummy
    defaults:
      run:
        working-directory: back
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Compile backend sources
        run: ./gradlew --no-daemon compileJava compileTestJava

      - name: Run targeted backend tests
        run: >
          ./gradlew --no-daemon test
          --tests "com.back.BackApplicationTests"
          --tests "com.back.global.security.config.SecurityConfigTest"
          --tests "com.back.global.security.config.SecurityIntegrationTest"
          --tests "com.back.auth.application.AuthServiceTest"

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    defaults:
      run:
        working-directory: front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
