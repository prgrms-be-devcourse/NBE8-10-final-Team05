name: security

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
  schedule:
    - cron: "19 16 * * 0"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codeql-java:
    name: codeql-java
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      GOOGLE_API_KEY: test_key_dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Initialize CodeQL for Java
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew
        working-directory: back

      - name: Build backend for CodeQL
        run: ./gradlew --no-daemon compileJava compileTestJava
        working-directory: back

      - name: Analyze Java
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:java-kotlin

  codeql-javascript-typescript:
    name: codeql-javascript-typescript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL for JavaScript/TypeScript
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Analyze JavaScript/TypeScript
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
