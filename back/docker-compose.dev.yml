services:
  redis:
    image: redis:latest
    container_name: maum-on-redis
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Seoul
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    networks:
      - maum-on
  postgres:
    image: postgres:16-alpine
    container_name: maum-on-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: maum_on_dev
      POSTGRES_USER: maum_on
      POSTGRES_PASSWORD: maum_on
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - maum-on
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maum_on -d maum_on_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-dev-data:

networks:
  maum-on:
    name: maum-on
