services:
  redis:
    image: redis:latest
    container_name: maum-on-redis
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Seoul
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
  postgres:
    image: jangka512/pgj:latest
    container_name: maum-on-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      POSTGRES_DATABASE: postgres
      POSTGRES_DATABASES: maum_on_dev,maum_on_test
      POSTGRES_USER: maum_on
      POSTGRES_PASSWORD: maum_on
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements,auto_explain
      -c auto_explain.log_min_duration=1000
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off
      -c wal_level=minimal
      -c max_wal_senders=0
      -c random_page_cost=1.1
      -c jit=off
      -c log_min_duration_statement=1000
      -c log_statement=all
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=6
      -c idle_in_transaction_session_timeout=60000
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maum_on -d maum_on_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
