spring:
  application:
    name: back
  profiles:
    active: dev

custom:
  jwt:
    issuer: ${JWT_ISSUER:maum-on}
    secret-key: ${JWT_SECRET_KEY:maum-on-default-secret-key-change-this-in-production-1234567890}
    access-token-expire-seconds: ${JWT_ACCESS_TOKEN_EXPIRE_SECONDS:3600}
    refresh-token-expire-seconds: ${JWT_REFRESH_TOKEN_EXPIRE_SECONDS:1209600}
    refresh-token-cookie-name: ${JWT_REFRESH_TOKEN_COOKIE_NAME:refreshToken}
