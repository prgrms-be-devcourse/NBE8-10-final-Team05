spring:
  application:
    name: back
  datasource:
    url: ${DEV_DB_URL:jdbc:postgresql://localhost:5432/maum_on_dev}
    username: ${DEV_DB_USERNAME:maum_on}
    password: ${DEV_DB_PASSWORD:maum_on}
  jpa:
    hibernate:
      ddl-auto: update
  config:
    import: optional:file:./back/.env[.properties],optional:file:.env[.properties]
  security:
    oauth2:
      client:
        provider:
          maum-on-oidc:
            issuer-uri: https://accounts.google.com
            user-name-attribute: sub
          kakao:
            issuer-uri: https://kauth.kakao.com
            user-name-attribute: sub
        registration:
          maum-on-oidc:
            provider: maum-on-oidc
            client-id: replace-with-google-client-id
            client-secret: replace-with-google-client-secret
            client-authentication-method: client_secret_basic
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/{registrationId}
            scope:
              - openid
              - profile
              - email
          kakao:
            provider: kakao
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/{registrationId}
            scope:
              - openid
              - profile_nickname
gemini:
  api:
    key: ${GOOGLE_API_KEY}

custom:
  auth:
    oidc:
      authorize-enabled: true
      authorize-ttl-seconds: 300
      redirect-uri-allowlist:
        - http://localhost:3000
        - http://127.0.0.1:3000
  jwt:
    secret-key: ${JWT_SECRET_KEY:replace-with-at-least-32-characters-secret}
    refresh-token-cookie-secure: ${JWT_REFRESH_TOKEN_COOKIE_SECURE:false}
    refresh-token-cookie-same-site: ${JWT_REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
