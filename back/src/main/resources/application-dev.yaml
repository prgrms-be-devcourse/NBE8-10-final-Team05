spring:
  application:
    name: back
  datasource:
    url: ${DEV_DB_URL:jdbc:postgresql://localhost:5432/maum_on_dev}
    username: ${DEV_DB_USERNAME:maum_on}
    password: ${DEV_DB_PASSWORD:maum_on}
  jpa:
    hibernate:
      ddl-auto: update
gemini:
  api:
    key: ${GOOGLE_API_KEY}

custom:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    refresh-token-cookie-secure: ${JWT_REFRESH_TOKEN_COOKIE_SECURE:false}
    refresh-token-cookie-same-site: ${JWT_REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
